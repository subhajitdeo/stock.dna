name: Fetch and Commit NIFTY Data

on:
  schedule:
    # ┌───────────── minute (0 - 59)
    # │ ┌───────────── hour (0 - 23)
    # │ │ ┌───────────── day of the month (1 - 31)
    # │ │ │ ┌───────────── month (1 - 12)
    # │ │ │ │ ┌───────────── day of the week (0 - 6)
    # │ │ │ │ │
    # │ │ │ │ │
    # * * * * *
    #
    # This cron schedule means: run at minute 0,5,10,... every hour.
    - cron: '*/5 * * * *'
    
  workflow_dispatch:

jobs:
  fetch-and-commit:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # <--- This is crucial. It gives the action permission to push code back to your repo.
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run Python script
        run: python main.py

      - name: Commit and push changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Auto-fetch: NIFTY Option Chain Data"
          commit_user_name: "Market Data Bot"
          commit_user_email: "market-data-bot@users.noreply.github.com"
          commit_author: "Market Data Bot <market-data-bot@users.noreply.github.com>"
          file_pattern: "*.csv"
