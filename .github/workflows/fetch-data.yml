name: Fetch Stock Data

on:
  schedule:
    - cron: '0 1 * * *'   # Runs daily at 01:00 UTC
  workflow_dispatch:      # Allows manual run from GitHub UI

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Create data directory
        run: mkdir -p data

      - name: Fetch data for each symbol
        run: |
          SYMBOLS=$(jq -r '.[]' nifty500.json)
          for SYMBOL in $SYMBOLS; do
            echo "Fetching $SYMBOL ..."
            # Ensure symbol ends with .NS (already in JSON, but safe)
            SYM=$SYMBOL
            [[ $SYM != *.NS ]] && SYM="${SYM}.NS"
            URL="https://query1.finance.yahoo.com/v8/finance/chart/${SYM}?period1=$(date -d '1 year ago' +%s)&period2=$(date +%s)&interval=1d"
            curl -s -o "data/${SYM}.json" "$URL"
            # Optional: validate JSON
            if ! jq empty "data/${SYM}.json" 2>/dev/null; then
              echo "Warning: Invalid JSON for $SYM"
              rm "data/${SYM}.json"
            fi
          done

      - name: Commit and push updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --quiet && git diff --staged --quiet || git commit -m "Update stock data [skip ci]"
          git push
