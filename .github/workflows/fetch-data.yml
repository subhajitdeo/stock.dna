name: Fetch Stock Data

on:
  schedule:
    # 5 PM IST = 11:30 UTC
    - cron: '30 11 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create data directory
        run: mkdir -p data

      - name: Fetch data for each symbol from CSV
        run: |
          # Check if nifty500.csv exists
          if [ ! -f "nifty500.csv" ]; then
            echo "❌ nifty500.csv not found!"
            exit 1
          fi
          
          # Read symbols from CSV
          SYMBOLS=$(cat nifty500.csv | grep -v '^#' | grep -v '^$' | tr -d '\r')
          
          if [ -z "$SYMBOLS" ]; then
            echo "❌ No symbols found in nifty500.csv"
            exit 1
          fi
          
          TOTAL_SYMBOLS=$(echo "$SYMBOLS" | wc -l)
          echo "📊 Found $TOTAL_SYMBOLS symbols"
          echo "⏱️  Will take approximately $(echo "scale=1; $TOTAL_SYMBOLS * 0.7 / 60" | bc) minutes"
          
          # Calculate date range
          END=$(date +%s)
          START=$(date -d '1 year ago' +%s)
          
          SUCCESS=0
          FAILED=0
          COUNTER=0
          
          for SYMBOL in $SYMBOLS; do
            # Auto-add .NS if not present
            if [[ $SYMBOL != *".NS" ]]; then
              SYM="${SYMBOL}.NS"
            else
              SYM="$SYMBOL"
            fi
            
            COUNTER=$((COUNTER + 1))
            echo ""
            echo "🔄 [$COUNTER/$TOTAL_SYMBOLS] Fetching $SYM ..."
            
            URL="https://query1.finance.yahoo.com/v8/finance/chart/${SYM}?period1=${START}&period2=${END}&interval=1d"
            
            # Download with proper headers
            RESPONSE=$(curl -s -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" \
                             -H "Accept: application/json" \
                             "$URL")
            
            # Check if response contains error
            if echo "$RESPONSE" | jq -e '.chart.error' > /dev/null 2>&1; then
              ERROR_MSG=$(echo "$RESPONSE" | jq -r '.chart.error.description // "Unknown error"')
              echo "❌ Yahoo error for $SYM: $ERROR_MSG"
              FAILED=$((FAILED + 1))
            else
              # Extract OHLCV data
              echo "$RESPONSE" | jq -c '
                .chart.result[0].timestamp as $ts
                | .chart.result[0].indicators.quote[0] as $q
                | [ range(0; $ts | length) | {
                    time: ($ts[.] | todateiso8601[:10]),
                    open: $q.open[.],
                    high: $q.high[.],
                    low: $q.low[.],
                    close: $q.close[.],
                    volume: $q.volume[.]
                  } ]
                | map(select(.open != null and .high != null and .low != null and .close != null and .volume != null))
              ' > "data/${SYM}.tmp"
              
              # Validate and save
              if [ -s "data/${SYM}.tmp" ] && jq empty "data/${SYM}.tmp" 2>/dev/null && [ "$(jq length "data/${SYM}.tmp")" -gt 30 ]; then
                mv "data/${SYM}.tmp" "data/${SYM}.json"
                COUNT=$(jq length "data/${SYM}.json")
                echo "✅ Saved $SYM - $COUNT trading days"
                SUCCESS=$((SUCCESS + 1))
              else
                echo "❌ Invalid data for $SYM"
                rm -f "data/${SYM}.tmp"
                FAILED=$((FAILED + 1))
              fi
            fi
            
            # ⏱️ RATE LIMITING: Wait 1 seconds before next request
            # This prevents Yahoo from blocking you
            if [ $COUNTER -lt $TOTAL_SYMBOLS ]; then
              echo "⏳ Waiting 1 seconds before next request..."
              sleep 1
            fi
          done
          
          echo ""
          echo "========================================="
          echo "📊 SUMMARY: $SUCCESS successful, $FAILED failed out of $TOTAL_SYMBOLS"
          echo "========================================="

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "No new data to commit"
          else
            git commit -m "Auto-update stock data [skip ci]"
            git push
          fi
