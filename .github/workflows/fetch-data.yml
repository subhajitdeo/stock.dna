name: Fetch Stock Data

on:
  schedule:
    - cron: '0 1 * * *'      # daily at 01:00 UTC
  workflow_dispatch:          # manual trigger

permissions:
  contents: write             # needed to push commits

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js (for jq and date)
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Create data directory
        run: mkdir -p data

      - name: Fetch data for each symbol
        run: |
          # Read symbols from nifty500.json
          SYMBOLS=$(jq -r '.[]' nifty500.json)
          for SYMBOL in $SYMBOLS; do
            echo "Fetching $SYMBOL ..."
            SYM=$SYMBOL
            [[ $SYM != *.NS ]] && SYM="${SYM}.NS"
            END=$(date +%s)
            START=$(date -d '1 year ago' +%s)
            URL="https://query1.finance.yahoo.com/v8/finance/chart/${SYM}?period1=${START}&period2=${END}&interval=1d"

            # Download with proper User-Agent
            RESPONSE=$(curl -s -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" "$URL")

            # Extract the clean OHLCV data using jq
            echo "$RESPONSE" | jq '
              .chart.result[0].timestamp as $ts
              | .chart.result[0].indicators.quote[0] as $q
              | [ range(0; $ts | length) | {
                  time: ($ts[.] | todateiso8601[:10]),
                  open: $q.open[.],
                  high: $q.high[.],
                  low: $q.low[.],
                  close: $q.close[.],
                  volume: $q.volume[.]
                } ]
              | map(select(.open != null and .high != null and .low != null and .close != null and .volume != null))
            ' > "data/${SYM}.tmp"

            # Check if the file is non‑empty and valid
            if [ -s "data/${SYM}.tmp" ] && jq empty "data/${SYM}.tmp" 2>/dev/null; then
              mv "data/${SYM}.tmp" "data/${SYM}.json"
              echo "✓ Saved data/${SYM}.json"
            else
              echo "✗ Invalid or empty data for $SYM"
              rm -f "data/${SYM}.tmp"
            fi
          done

      - name: Commit and push updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Update stock data [skip ci]"
            git push
          fi
