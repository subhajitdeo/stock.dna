name: Fetch & Calculate Indicators

on:
  schedule:
    - cron: '00 12 * * *'  # 5:30 PM IST (12:00 UTC)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  process:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: pip install pandas numpy ta
      
      - name: Fetch raw data from Yahoo
        run: |
          mkdir -p data/raw data/processed
          
          # Read symbols from CSV
          SYMBOLS=$(cat nifty500.csv | grep -v '^#' | grep -v '^$' | tr -d '\r')
          
          END=$(date +%s)
          START=$(date -d '1 year ago' +%s)
          
          for SYMBOL in $SYMBOLS; do
            if [[ $SYMBOL != *".NS" ]]; then
              SYM="${SYMBOL}.NS"
            else
              SYM="$SYMBOL"
            fi
            
            echo "Fetching $SYM ..."
            URL="https://query1.finance.yahoo.com/v8/finance/chart/${SYM}?period1=${START}&period2=${END}&interval=1d"
            
            curl -s -H "User-Agent: Mozilla/5.0" "$URL" > "data/raw/${SYM}.json"
            
            # Small delay to be safe
            sleep 0.5
          done
      
      - name: Calculate indicators from raw files
        run: |
          import json
          import os
          import pandas as pd
          import numpy as np
          from ta.momentum import RSIIndicator, MACD
          from ta.trend import EMAIndicator, SMAIndicator, ADXIndicator
          from ta.volatility import BollingerBands, AverageTrueRange
          from ta.volume import OnBalanceVolumeIndicator
          
          raw_dir = 'data/raw'
          processed_dir = 'data/processed'
          
          for filename in os.listdir(raw_dir):
              if not filename.endswith('.json'):
                  continue
              
              ticker = filename.replace('.json', '')
              print(f"Calculating indicators for {ticker}...")
              
              # Read raw JSON file
              with open(os.path.join(raw_dir, filename), 'r') as f:
                  raw_data = json.load(f)
              
              # Extract OHLCV from Yahoo response
              result = raw_data.get('chart', {}).get('result', [])
              if not result:
                  print(f"  No data for {ticker}")
                  continue
              
              quotes = result[0].get('indicators', {}).get('quote', [{}])[0]
              timestamps = result[0].get('timestamp', [])
              
              # Build DataFrame
              data = []
              for i in range(len(timestamps)):
                  if all([
                      quotes.get('open', [None])[i] is not None,
                      quotes.get('high', [None])[i] is not None,
                      quotes.get('low', [None])[i] is not None,
                      quotes.get('close', [None])[i] is not None,
                      quotes.get('volume', [None])[i] is not None
                  ]):
                      data.append({
                          'time': pd.Timestamp(timestamps[i], unit='s').strftime('%Y-%m-%d'),
                          'open': quotes['open'][i],
                          'high': quotes['high'][i],
                          'low': quotes['low'][i],
                          'close': quotes['close'][i],
                          'volume': quotes['volume'][i]
                      })
              
              if len(data) < 30:
                  print(f"  Insufficient data for {ticker} (only {len(data)} days)")
                  continue
              
              df = pd.DataFrame(data)
              df['time'] = pd.to_datetime(df['time'])
              df.set_index('time', inplace=True)
              
              # Calculate ALL indicators
              # RSI
              df['RSI'] = RSIIndicator(close=df['close'], window=14).rsi()
              
              # MACD
              macd = MACD(close=df['close'])
              df['MACD'] = macd.macd()
              df['MACD_signal'] = macd.macd_signal()
              df['MACD_histogram'] = macd.macd_diff()
              
              # EMAs
              df['EMA20'] = EMAIndicator(close=df['close'], window=20).ema_indicator()
              df['EMA50'] = EMAIndicator(close=df['close'], window=50).ema_indicator()
              df['EMA100'] = EMAIndicator(close=df['close'], window=100).ema_indicator()
              df['EMA200'] = EMAIndicator(close=df['close'], window=200).ema_indicator()
              
              # SMAs
              df['SMA20'] = SMAIndicator(close=df['close'], window=20).sma_indicator()
              df['SMA50'] = SMAIndicator(close=df['close'], window=50).sma_indicator()
              df['SMA200'] = SMAIndicator(close=df['close'], window=200).sma_indicator()
              
              # Bollinger Bands
              bb = BollingerBands(close=df['close'], window=20, window_dev=2)
              df['BB_upper'] = bb.bollinger_hband()
              df['BB_middle'] = bb.bollinger_mavg()
              df['BB_lower'] = bb.bollinger_lband()
              
              # ATR (Average True Range)
              df['ATR'] = AverageTrueRange(high=df['high'], low=df['low'], close=df['close'], window=14).average_true_range()
              
              # ADX
              adx = ADXIndicator(high=df['high'], low=df['low'], close=df['close'], window=14)
              df['ADX'] = adx.adx()
              df['DI_plus'] = adx.adx_pos()
              df['DI_minus'] = adx.adx_neg()
              
              # OBV (On Balance Volume)
              df['OBV'] = OnBalanceVolumeIndicator(close=df['close'], volume=df['volume']).on_balance_volume()
              
              # Get latest values
              latest = df.iloc[-1]
              prev = df.iloc[-2] if len(df) > 1 else latest
              
              # Generate signals
              def get_signal(value, buy_condition, sell_condition):
                  if buy_condition:
                      return 'BUY'
                  elif sell_condition:
                      return 'SELL'
                  return 'NEUTRAL'
              
              signals_data = {
                  'symbol': ticker,
                  'updated_at': pd.Timestamp.now().isoformat(),
                  'latest_price': float(latest['close']),
                  'candles': data[-252:],  # Last 252 days for chart
                  'indicators': {
                      'RSI': {
                          'value': float(latest['RSI']) if pd.notna(latest['RSI']) else None,
                          'signal': get_signal(latest['RSI'], latest['RSI'] < 30, latest['RSI'] > 70)
                      },
                      'MACD': {
                          'value': float(latest['MACD']) if pd.notna(latest['MACD']) else None,
                          'signal': get_signal(latest['MACD'], latest['MACD'] > latest['MACD_signal'], latest['MACD'] < latest['MACD_signal'])
                      },
                      'EMA20': {
                          'value': float(latest['EMA20']) if pd.notna(latest['EMA20']) else float(latest['close']),
                          'signal': get_signal(latest['close'], latest['close'] > latest['EMA20'], latest['close'] < latest['EMA20'])
                      },
                      'EMA50': {
                          'value': float(latest['EMA50']) if pd.notna(latest['EMA50']) else float(latest['close']),
                          'signal': get_signal(latest['close'], latest['close'] > latest['EMA50'], latest['close'] < latest['EMA50'])
                      },
                      'EMA100': {
                          'value': float(latest['EMA100']) if pd.notna(latest['EMA100']) else float(latest['close']),
                          'signal': get_signal(latest['close'], latest['close'] > latest['EMA100'], latest['close'] < latest['EMA100'])
                      },
                      'EMA200': {
                          'value': float(latest['EMA200']) if pd.notna(latest['EMA200']) else float(latest['close']),
                          'signal': get_signal(latest['close'], latest['close'] > latest['EMA200'], latest['close'] < latest['EMA200'])
                      },
                      'SMA20': {
                          'value': float(latest['SMA20']) if pd.notna(latest['SMA20']) else float(latest['close']),
                          'signal': get_signal(latest['close'], latest['close'] > latest['SMA20'], latest['close'] < latest['SMA20'])
                      },
                      'SMA50': {
                          'value': float(latest['SMA50']) if pd.notna(latest['SMA50']) else float(latest['close']),
                          'signal': get_signal(latest['close'], latest['close'] > latest['SMA50'], latest['close'] < latest['SMA50'])
                      },
                      'SMA200': {
                          'value': float(latest['SMA200']) if pd.notna(latest['SMA200']) else float(latest['close']),
                          'signal': get_signal(latest['close'], latest['close'] > latest['SMA200'], latest['close'] < latest['SMA200'])
                      },
                      'BollingerBands': {
                          'upper': float(latest['BB_upper']) if pd.notna(latest['BB_upper']) else None,
                          'lower': float(latest['BB_lower']) if pd.notna(latest['BB_lower']) else None,
                          'signal': get_signal(latest['close'], latest['close'] < latest['BB_lower'], latest['close'] > latest['BB_upper'])
                      },
                      'ATR': {
                          'value': float(latest['ATR']) if pd.notna(latest['ATR']) else None,
                          'signal': 'HIGH_VOLATILITY' if pd.notna(latest['ATR']) and latest['ATR'] > df['ATR'].mean() else 'LOW_VOLATILITY'
                      },
                      'ADX': {
                          'value': float(latest['ADX']) if pd.notna(latest['ADX']) else None,
                          'signal': 'STRONG_TREND' if latest['ADX'] > 25 else 'WEAK_TREND'
                      },
                      'OBV': {
                          'value': float(latest['OBV']) if pd.notna(latest['OBV']) else None,
                          'signal': get_signal(latest['OBV'], latest['OBV'] > prev['OBV'], latest['OBV'] < prev['OBV'])
                      }
                  }
              }
              
              # Save processed data
              output_file = os.path.join(processed_dir, ticker.replace('.NS', '') + '.json')
              with open(output_file, 'w') as f:
                  json.dump(signals_data, f, indent=2)
              
              print(f"  ✅ Saved {output_file}")
          
          print("\n🎉 All indicators calculated!")
      
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --cached --quiet || git commit -m "Update stock data & indicators [skip ci]"
          git push
