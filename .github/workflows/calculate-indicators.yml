name: Test Data Files

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: List all files in data folder
        run: |
          echo "=== FILES IN /data ==="
          ls -la data/
          echo ""
          echo "=== FILES IN /data/processed (if exists) ==="
          ls -la data/processed/ 2>/dev/null || echo "No processed folder yet"
          echo ""
          echo "=== SAMPLE FILE CONTENT (first 500 chars) ==="
          if [ -f data/RELIANCE.NS.json ]; then
            head -c 500 data/RELIANCE.NS.json
          else
            echo "RELIANCE.NS.json not found"
            ls data/
          fi
      
      - name: Test reading with Python
        run: |
          python3 -c "
import json
import os

data_dir = 'data'
files = [f for f in os.listdir(data_dir) if f.endswith('.json')]
print(f'Found {len(files)} JSON files')

if files:
    test_file = files[0]
    print(f'Testing: {test_file}')
    with open(os.path.join(data_dir, test_file), 'r') as f:
        data = json.load(f)
    print(f'File has keys: {list(data.keys())}')
    
    # Check if it's Yahoo format
    if 'chart' in data:
        result = data['chart'].get('result', [])
        if result:
            quotes = result[0].get('indicators', {}).get('quote', [{}])[0]
            timestamps = result[0].get('timestamp', [])
            print(f'✅ Yahoo format: {len(timestamps)} timestamps')
            print(f'✅ Quotes available: {len(quotes.get(\"close\", []))} close prices')
else:
    print('No JSON files found in data/')
"
