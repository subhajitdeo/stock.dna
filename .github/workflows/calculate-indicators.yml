name: Calculate Indicators

on:
  schedule:
    - cron: '30 12 * * *'   # 6:00 PM IST (adjust as needed)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  calculate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          pip install pandas numpy ta
      
      - name: Create Python calculator script
        run: |
          cat > calculate.py << 'EOF'
import json
import os
import pandas as pd
import numpy as np
from ta.momentum import RSIIndicator, MACD
from ta.trend import EMAIndicator, SMAIndicator, ADXIndicator
from ta.volatility import BollingerBands, AverageTrueRange
from ta.volume import OnBalanceVolumeIndicator

DATA_DIR = 'data'
PROCESSED_DIR = 'data/processed'
MIN_DAYS = 30

os.makedirs(PROCESSED_DIR, exist_ok=True)

def get_signal(buy_cond, sell_cond):
    if buy_cond: return 'BUY'
    if sell_cond: return 'SELL'
    return 'NEUTRAL'

def safe_float(x):
    return float(x) if pd.notna(x) else None

files = [f for f in os.listdir(DATA_DIR) if f.endswith('.json') and f != 'processed']
print(f"Found {len(files)} files to process")

for filename in files:
    ticker = filename.replace('.json', '')
    print(f"\n📊 Processing {ticker}...")
    
    try:
        with open(os.path.join(DATA_DIR, filename), 'r') as f:
            raw = json.load(f)
        
        result = raw.get('chart', {}).get('result', [])
        if not result:
            print(f"  No data for {ticker}")
            continue
        
        quotes = result[0].get('indicators', {}).get('quote', [{}])[0]
        timestamps = result[0].get('timestamp', [])
        
        rows = []
        for i in range(len(timestamps)):
            o = quotes.get('open', [None])[i]
            h = quotes.get('high', [None])[i]
            l = quotes.get('low', [None])[i]
            c = quotes.get('close', [None])[i]
            v = quotes.get('volume', [None])[i]
            if None not in (o, h, l, c, v):
                rows.append({
                    'time': pd.Timestamp(timestamps[i], unit='s').strftime('%Y-%m-%d'),
                    'open': float(o),
                    'high': float(h),
                    'low': float(l),
                    'close': float(c),
                    'volume': int(v)
                })
        
        if len(rows) < MIN_DAYS:
            print(f"  Insufficient days: {len(rows)}")
            continue
        
        df = pd.DataFrame(rows)
        df['time'] = pd.to_datetime(df['time'])
        df.set_index('time', inplace=True)
        
        # Calculate indicators
        df['RSI'] = RSIIndicator(close=df['close'], window=14).rsi()
        
        macd = MACD(close=df['close'])
        df['MACD'] = macd.macd()
        df['MACD_signal'] = macd.macd_signal()
        
        df['EMA20'] = EMAIndicator(close=df['close'], window=20).ema_indicator()
        df['EMA50'] = EMAIndicator(close=df['close'], window=50).ema_indicator()
        df['EMA100'] = EMAIndicator(close=df['close'], window=100).ema_indicator()
        df['EMA200'] = EMAIndicator(close=df['close'], window=200).ema_indicator()
        
        df['SMA20'] = SMAIndicator(close=df['close'], window=20).sma_indicator()
        df['SMA50'] = SMAIndicator(close=df['close'], window=50).sma_indicator()
        df['SMA200'] = SMAIndicator(close=df['close'], window=200).sma_indicator()
        
        bb = BollingerBands(close=df['close'], window=20, window_dev=2)
        df['BB_upper'] = bb.bollinger_hband()
        df['BB_lower'] = bb.bollinger_lband()
        
        df['ATR'] = AverageTrueRange(high=df['high'], low=df['low'], close=df['close'], window=14).average_true_range()
        
        adx = ADXIndicator(high=df['high'], low=df['low'], close=df['close'], window=14)
        df['ADX'] = adx.adx()
        
        df['OBV'] = OnBalanceVolumeIndicator(close=df['close'], volume=df['volume']).on_balance_volume()
        
        latest = df.iloc[-1]
        prev = df.iloc[-2] if len(df) > 1 else latest
        
        # Build output
        output = {
            'symbol': ticker,
            'updated_at': pd.Timestamp.now().isoformat(),
            'latest_price': round(float(latest['close']), 2),
            'candles': rows[-252:],
            'indicators': {
                'RSI': {
                    'value': safe_float(latest['RSI']),
                    'signal': get_signal(latest['RSI'] < 30, latest['RSI'] > 70)
                },
                'MACD': {
                    'value': safe_float(latest['MACD']),
                    'signal': get_signal(latest['MACD'] > latest['MACD_signal'], latest['MACD'] < latest['MACD_signal'])
                },
                'EMA20': {
                    'value': safe_float(latest['EMA20']) or round(float(latest['close']), 2),
                    'signal': get_signal(latest['close'] > latest['EMA20'], latest['close'] < latest['EMA20'])
                },
                'EMA50': {
                    'value': safe_float(latest['EMA50']) or round(float(latest['close']), 2),
                    'signal': get_signal(latest['close'] > latest['EMA50'], latest['close'] < latest['EMA50'])
                },
                'EMA100': {
                    'value': safe_float(latest['EMA100']) or round(float(latest['close']), 2),
                    'signal': get_signal(latest['close'] > latest['EMA100'], latest['close'] < latest['EMA100'])
                },
                'EMA200': {
                    'value': safe_float(latest['EMA200']) or round(float(latest['close']), 2),
                    'signal': get_signal(latest['close'] > latest['EMA200'], latest['close'] < latest['EMA200'])
                },
                'SMA20': {
                    'value': safe_float(latest['SMA20']) or round(float(latest['close']), 2),
                    'signal': get_signal(latest['close'] > latest['SMA20'], latest['close'] < latest['SMA20'])
                },
                'SMA50': {
                    'value': safe_float(latest['SMA50']) or round(float(latest['close']), 2),
                    'signal': get_signal(latest['close'] > latest['SMA50'], latest['close'] < latest['SMA50'])
                },
                'SMA200': {
                    'value': safe_float(latest['SMA200']) or round(float(latest['close']), 2),
                    'signal': get_signal(latest['close'] > latest['SMA200'], latest['close'] < latest['SMA200'])
                },
                'BollingerBands': {
                    'upper': safe_float(latest['BB_upper']),
                    'lower': safe_float(latest['BB_lower']),
                    'signal': get_signal(latest['close'] < latest['BB_lower'], latest['close'] > latest['BB_upper'])
                },
                'ATR': {
                    'value': safe_float(latest['ATR']),
                    'signal': 'HIGH' if latest['ATR'] > df['ATR'].mean() else 'LOW'
                },
                'ADX': {
                    'value': safe_float(latest['ADX']),
                    'signal': 'STRONG_TREND' if latest['ADX'] > 25 else 'WEAK_TREND'
                },
                'OBV': {
                    'value': safe_int(latest['OBV']),
                    'signal': get_signal(latest['OBV'] > prev['OBV'], latest['OBV'] < prev['OBV'])
                }
            }
        }
        
        # Save to processed folder
        out_path = os.path.join(PROCESSED_DIR, ticker)
        with open(out_path, 'w') as f:
            json.dump(output, f, indent=2)
        
        print(f"  ✅ Saved to {out_path}")
        
    except Exception as e:
        print(f"  ❌ Error: {e}")

print("\n✅ All indicators calculated successfully!")
EOF
      
      - name: Run calculation
        run: python calculate.py
      
      - name: Commit and push results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/processed/
          git diff --cached --quiet || git commit -m "Auto-calculate technical indicators [skip ci]"
          git push
