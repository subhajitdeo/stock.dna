<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#0a0f1e">
    <title>Nexus Charts | NIFTY 500 Technical Analysis</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Lightweight Charts -->
    <script src="https://unpkg.com/lightweight-charts@4.1.0/dist/lightweight-charts.standalone.production.js"></script>
    <!-- Technical Indicators (ensure it loads) -->
    <script src="https://unpkg.com/technicalindicators@3.1.0/dist/technicalindicators.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="app-container">
    <header class="glass-header">
        <div class="logo-area"><i class="fas fa-chart-line"></i><span>Nexus<span class="accent">Charts</span></span><span class="badge">NIFTY 500</span></div>
        <div class="search-area">
            <div class="search-wrapper">
                <i class="fas fa-search"></i>
                <input type="text" id="stockInput" placeholder="RELIANCE, TCS, INFY..." autocomplete="off" list="niftySuggestions">
                <datalist id="niftySuggestions"></datalist>
                <button id="searchBtn" class="btn-primary">Analyze</button>
            </div>
        </div>
    </header>

    <div class="chart-glass-card">
        <div class="chart-header">
            <div id="symbolTitle" class="symbol-title">—</div>
            <div class="chart-badge"><i class="fas fa-calendar-alt"></i> Daily • 1 Year</div>
        </div>
        <div id="chartContainer" style="width:100%; min-height:320px;"></div>
        <div id="loadingOverlay" class="loading-overlay hidden">
            <div class="spinner"></div>
            <p>Fetching data & calculating indicators...</p>
        </div>
    </div>

    <div class="dashboard-grid">
        <div class="indicators-panel">
            <div class="category-card"><div class="cat-header"><i class="fas fa-chart-line"></i> Trend</div><div class="indicators-list" id="trendIndicators"></div></div>
            <div class="category-card"><div class="cat-header"><i class="fas fa-bolt"></i> Momentum</div><div class="indicators-list" id="momentumIndicators"></div></div>
            <div class="category-card"><div class="cat-header"><i class="fas fa-chart-column"></i> Volume</div><div class="indicators-list" id="volumeIndicators"></div></div>
            <div class="category-card"><div class="cat-header"><i class="fas fa-wave-square"></i> Volatility</div><div class="indicators-list" id="volatilityIndicators"></div></div>
        </div>
        <div class="insights-panel">
            <div class="recommendation-card">
                <h3><i class="fas fa-robot"></i> Overall Verdict</h3>
                <div id="finalRec" class="final-recommendation">NEUTRAL</div>
                <div class="strength-meter-wrapper">
                    <div class="meter-label">Bullish Strength <span id="bullishPercent">0</span>%</div>
                    <div class="meter-bar-bg"><div id="bullishMeterFill" class="meter-fill"></div></div>
                </div>
                <div class="signal-stats">
                    <span><i class="fas fa-arrow-up"></i> BUY: <span id="buyCount">0</span></span>
                    <span><i class="fas fa-arrow-down"></i> SELL: <span id="sellCount">0</span></span>
                    <span><i class="fas fa-minus-circle"></i> NEUTRAL: <span id="neutralCount">0</span></span>
                </div>
            </div>
            <div class="ai-summary-card">
                <div class="cat-header"><i class="fas fa-microchip"></i> AI Synopsis</div>
                <div id="aiSummaryText" class="summary-text">Enter a symbol and click Analyze.</div>
            </div>
        </div>
    </div>
</div>
<script src="script.js"></script>
</body>
</html>
