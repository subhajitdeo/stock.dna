<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test – NIFTY Chart</title>
    <style>
        body { background: #0a0f1e; color: white; font-family: monospace; padding: 20px; }
        button { padding: 10px 20px; margin: 10px; cursor: pointer; }
        #output { margin-top: 20px; white-space: pre-wrap; }
    </style>
</head>
<body>
    <h1>NIFTY Technical Analysis – Test</h1>
    <input type="text" id="symbol" value="RELIANCE.NS" placeholder="Symbol">
    <button id="analyze">Analyze</button>
    <div id="output">Click Analyze – we'll fetch data and show first 2 rows.</div>

    <script>
        document.getElementById('analyze').addEventListener('click', async () => {
            const symbol = document.getElementById('symbol').value.trim();
            document.getElementById('output').innerHTML = 'Fetching data for ' + symbol + '...';
            try {
                // Try to fetch from your GitHub Action data folder
                const url = `/data/${symbol}.json`;
                const res = await fetch(url);
                if (!res.ok) throw new Error(`HTTP ${res.status} – file not found`);
                const data = await res.json();
                document.getElementById('output').innerHTML = `Success! Loaded ${data.length} rows. First row: ${JSON.stringify(data[0], null, 2)}`;
            } catch (err) {
                document.getElementById('output').innerHTML = `Error: ${err.message}<br><br>If file not found, your GitHub Action may not have created /data/${symbol}.json. Try RELIANCE.NS (should exist if action ran).`;
            }
        });
    </script>
</body>
</html>
